<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#ffb6c1" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="EPIG" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <title>🐷 EPIG — 豬豬養成</title>
  <style>
    /* ── CSS Variables (Warm Pastel Theme) ─────────────────────────────── */
    :root {
      --color-bg: #fff5f0;
      --color-surface: #ffffff;
      --color-surface2: #fff0f5;
      --color-border: #ffd6e0;
      --color-primary: #ff8fa3;
      --color-primary-dark: #e07090;
      --color-secondary: #ffb347;
      --color-text: #5a3a3a;
      --color-text-light: #9a7a7a;
      --color-good: #7ec87e;
      --color-warn: #f0b840;
      --color-bad: #e06060;
      --color-shadow: rgba(255, 100, 120, 0.12);
      --radius: 16px;
      --radius-sm: 10px;
      --font: 'Nunito', system-ui, sans-serif;
    }

    /* ── Reset / Base ──────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: var(--font);
      background: var(--color-bg);
      color: var(--color-text);
      overflow-x: hidden;
    }
    button { cursor: pointer; font-family: inherit; border: none; outline: none; }
    select { font-family: inherit; }
    p { line-height: 1.6; }

    /* ── Layout ────────────────────────────────────────────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      max-width: 600px;
      margin: 0 auto;
    }

    /* ── HUD ───────────────────────────────────────────────────────────── */
    #hud {
      position: sticky;
      top: 0;
      z-index: 100;
      background: linear-gradient(135deg, #ff8fa3, #ffb6c1);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 12px var(--color-shadow);
    }
    #hud-title { font-size: 1.2rem; font-weight: 800; color: #fff; }
    #hud-day { font-size: 0.9rem; color: #fff; font-weight: 600; }
    #hud-coins { font-size: 0.95rem; color: #fff; font-weight: 700; }
    #hud-notif {
      background: #e04040;
      color: #fff;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 700;
    }

    /* ── Tab Bar ───────────────────────────────────────────────────────── */
    #tab-bar {
      display: flex;
      background: var(--color-surface);
      border-bottom: 2px solid var(--color-border);
      overflow-x: auto;
      scrollbar-width: none;
    }
    #tab-bar::-webkit-scrollbar { display: none; }
    .tab-btn {
      flex: 1;
      padding: 12px 8px;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--color-text-light);
      background: transparent;
      white-space: nowrap;
      transition: color 0.2s, border-bottom 0.2s;
      border-bottom: 3px solid transparent;
    }
    .tab-btn.tab-active {
      color: var(--color-primary);
      border-bottom-color: var(--color-primary);
    }

    /* ── Tab Content ───────────────────────────────────────────────────── */
    .tab-panel {
      padding: 16px;
      flex: 1;
      overflow-y: auto;
    }
    .tab-panel.hidden { display: none; }
    .section-title {
      font-size: 1rem;
      font-weight: 800;
      color: var(--color-text);
      margin: 20px 0 10px;
    }
    .empty-msg {
      text-align: center;
      color: var(--color-text-light);
      padding: 32px 0;
      font-size: 0.95rem;
    }

    /* ── Buttons ───────────────────────────────────────────────────────── */
    .btn {
      padding: 10px 18px;
      border-radius: var(--radius-sm);
      font-weight: 700;
      font-size: 0.9rem;
      transition: transform 0.1s, opacity 0.1s;
    }
    .btn:active { transform: scale(0.96); }
    .btn-primary {
      background: linear-gradient(135deg, #ff8fa3, #ff6b9d);
      color: #fff;
      box-shadow: 0 3px 10px rgba(255,100,120,0.3);
    }
    .btn-secondary {
      background: var(--color-surface2);
      color: var(--color-text);
      border: 1.5px solid var(--color-border);
    }
    .btn-danger {
      background: #e06060;
      color: #fff;
    }
    .btn-disabled {
      background: #e0d0d0;
      color: #aaa;
      cursor: not-allowed;
    }
    .btn-sm { padding: 6px 12px; font-size: 0.82rem; }
    .btn-wide { width: 100%; margin-top: 12px; }

    /* ── Pen Card ──────────────────────────────────────────────────────── */
    .pen-card {
      background: var(--color-surface);
      border-radius: var(--radius);
      border: 1.5px solid var(--color-border);
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 2px 12px var(--color-shadow);
    }
    .pen-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .pen-emoji { font-size: 1.6rem; }
    .pen-name { font-size: 1rem; font-weight: 800; flex: 1; }
    .pen-tier-badge {
      background: var(--color-primary);
      color: #fff;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 700;
    }
    .pen-stats {
      display: flex;
      gap: 12px;
      font-size: 0.85rem;
      margin-bottom: 12px;
    }
    .clean-good { color: var(--color-good); font-weight: 700; }
    .clean-warn { color: var(--color-warn); font-weight: 700; }
    .clean-bad { color: var(--color-bad); font-weight: 700; animation: pulse 1s infinite; }
    .pen-actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
    .max-tier { font-size: 0.85rem; color: var(--color-secondary); font-weight: 700; }

    /* ── Pig Grid ──────────────────────────────────────────────────────── */
    .pig-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 10px;
    }
    .pig-card {
      background: var(--color-surface2);
      border-radius: var(--radius-sm);
      border: 2px solid var(--rarity-color, var(--color-border));
      padding: 12px 8px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .pig-card.pig-dead { opacity: 0.7; background: #f0e0e0; }
    .pig-card.pig-infected { border-color: #e06060; animation: pulse 1.5s infinite; }
    .pig-rarity-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: var(--rarity-color, #ddd);
    }
    .pig-emoji { font-size: 2rem; margin: 4px 0; }
    .pig-name { font-size: 0.85rem; font-weight: 800; }
    .pig-breed { font-size: 0.72rem; color: var(--color-text-light); margin-bottom: 6px; }
    .baby-badge {
      background: #fff0e0;
      color: var(--color-secondary);
      font-size: 0.72rem;
      padding: 1px 6px;
      border-radius: 10px;
      display: inline-block;
      margin-bottom: 4px;
    }
    .pig-status.dead { color: var(--color-bad); font-weight: 700; margin: 4px 0; }

    /* ── Stat Bars ─────────────────────────────────────────────────────── */
    .pig-bars { margin: 6px 0; }
    .stat-bar-row {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 0.78rem;
      margin-bottom: 3px;
    }
    .stat-bar-bg {
      flex: 1;
      background: #f0e8e8;
      border-radius: 4px;
      height: 6px;
      overflow: hidden;
    }
    .stat-bar-fill { height: 100%; border-radius: 4px; transition: width 0.4s; }
    .bar-good { background: var(--color-good); }
    .bar-warn { background: var(--color-warn); }
    .bar-bad { background: var(--color-bad); }
    .stat-val { font-size: 0.72rem; color: var(--color-text-light); min-width: 22px; text-align: right; }

    /* ── Shop ──────────────────────────────────────────────────────────── */
    .shop-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 8px;
    }
    .shop-card {
      background: var(--color-surface);
      border-radius: var(--radius-sm);
      border: 2px solid var(--rarity-color, var(--color-border));
      padding: 12px;
      text-align: center;
      position: relative;
      overflow: hidden;
      box-shadow: 0 2px 8px var(--color-shadow);
    }
    .shop-rarity-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: var(--rarity-color, #ddd);
    }
    .shop-emoji { font-size: 2rem; margin: 6px 0; }
    .shop-name { font-size: 0.9rem; font-weight: 800; margin-bottom: 2px; }
    .shop-rarity { font-size: 0.75rem; color: var(--rarity-color, var(--color-text-light)); font-weight: 700; margin-bottom: 6px; }
    .shop-desc { font-size: 0.75rem; color: var(--color-text-light); margin-bottom: 4px; line-height: 1.4; }
    .shop-flavor { font-size: 0.72rem; color: #c0a0a0; font-style: italic; margin-bottom: 8px; line-height: 1.3; }
    .feed-stats { font-size: 0.75rem; color: var(--color-text); margin-bottom: 4px; }
    .feed-stock { font-size: 0.78rem; color: var(--color-text-light); margin-bottom: 6px; }
    .feed-buy-row { display: flex; gap: 4px; justify-content: center; flex-wrap: wrap; }

    /* ── Gacha ─────────────────────────────────────────────────────────── */
    .gacha-pools { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .gacha-pool-card {
      background: var(--color-surface);
      border-radius: var(--radius-sm);
      border: 1.5px solid var(--color-border);
      padding: 14px;
      text-align: center;
      box-shadow: 0 2px 8px var(--color-shadow);
    }
    .gacha-pool-header { display: flex; align-items: center; justify-content: center; gap: 6px; margin-bottom: 6px; }
    .gacha-pool-emoji { font-size: 1.5rem; }
    .gacha-pool-name { font-weight: 800; font-size: 0.95rem; }
    .gacha-pity { font-size: 0.75rem; color: var(--color-text-light); margin-bottom: 10px; }
    .gacha-btns { display: flex; flex-direction: column; gap: 6px; }

    .gacha-result {
      background: linear-gradient(135deg, #fff0f5, #f5e0ff);
      border-radius: var(--radius);
      border: 2px solid var(--color-primary);
      padding: 16px;
      margin-top: 20px;
      text-align: center;
    }
    .gacha-result.hidden { display: none; }
    .gacha-result-title { font-size: 1.1rem; margin-bottom: 12px; }
    .gacha-result-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }
    .result-card {
      background: var(--color-surface);
      border-radius: var(--radius-sm);
      border: 2px solid var(--result-color, var(--color-border));
      padding: 10px;
      text-align: center;
      position: relative;
      overflow: hidden;
      animation: flipIn 0.4s ease;
    }
    .result-color-bar {
      position: absolute; top: 0; left: 0; right: 0;
      height: 4px;
      background: var(--result-color, #ddd);
    }
    .result-emoji { font-size: 1.8rem; margin: 4px 0; }
    .result-name { font-size: 0.82rem; font-weight: 700; }
    .result-rarity { font-size: 0.72rem; color: var(--result-color, var(--color-text-light)); font-weight: 700; }
    .result-extra { font-size: 0.72rem; color: var(--color-text-light); }
    .result-extra.warn { color: var(--color-bad); }
    .legendary-glow { box-shadow: 0 0 20px gold; border-color: gold; animation: flipIn 0.4s ease, glowPulse 1.5s infinite; }

    /* ── Item Inventory ─────────────────────────────────────────────────── */
    .item-inventory { display: flex; flex-direction: column; gap: 10px; }
    .item-card {
      background: var(--color-surface);
      border-radius: var(--radius-sm);
      border: 1.5px solid var(--color-border);
      padding: 12px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }
    .item-emoji { font-size: 1.8rem; }
    .item-info { flex: 1; }
    .item-name { font-weight: 800; font-size: 0.9rem; margin-bottom: 4px; }
    .item-desc { font-size: 0.8rem; color: var(--color-text-light); margin-bottom: 6px; }
    .auto-badge {
      background: #e0f0ff;
      color: #4090c0;
      font-size: 0.72rem;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 700;
    }

    /* ── Modal ─────────────────────────────────────────────────────────── */
    #modal-overlay {
      position: fixed; inset: 0; z-index: 1000;
      background: rgba(100, 40, 60, 0.5);
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .modal-box {
      background: var(--color-surface);
      border-radius: var(--radius);
      padding: 24px;
      max-width: 440px;
      width: 100%;
      max-height: 85dvh;
      overflow-y: auto;
      box-shadow: 0 8px 40px rgba(0,0,0,0.2);
    }
    .modal-title {
      font-size: 1.1rem;
      font-weight: 800;
      margin-bottom: 14px;
      color: var(--color-primary-dark);
    }
    .modal-body { margin-bottom: 16px; }
    .modal-buttons { display: flex; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }

    /* ── Pig Detail Modal ───────────────────────────────────────────────── */
    .pig-detail { }
    .detail-header { display: flex; gap: 12px; align-items: center; margin-bottom: 12px; }
    .detail-emoji { font-size: 2.5rem; }
    .detail-name { font-size: 1.1rem; font-weight: 800; }
    .detail-breed { font-size: 0.82rem; color: var(--color-text-light); }
    .detail-age { font-size: 0.82rem; color: var(--color-text-light); }
    .detail-special { background: #fff8e0; border-radius: 8px; padding: 8px 12px; font-size: 0.82rem; margin-bottom: 8px; }
    .detail-flavor { font-size: 0.78rem; color: #c0a0a0; font-style: italic; margin-bottom: 12px; }
    .infected-banner { background: #ffe0e0; color: #c04040; border-radius: 8px; padding: 8px 12px; font-weight: 700; font-size: 0.85rem; margin-bottom: 10px; }
    .detail-bars { margin-bottom: 12px; }
    .detail-feed label { font-size: 0.85rem; display: flex; flex-direction: column; gap: 6px; }
    .detail-feed select { padding: 8px; border-radius: 8px; border: 1.5px solid var(--color-border); font-size: 0.85rem; }

    /* ── Event Overlay ─────────────────────────────────────────────────── */
    #event-overlay {
      position: fixed; inset: 0; z-index: 2000;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .event-overlay.event-negative { background: rgba(120, 30, 30, 0.85); }
    .event-overlay.event-positive { background: rgba(30, 80, 30, 0.75); }
    .event-box {
      background: var(--color-surface);
      border-radius: var(--radius);
      padding: 28px 24px;
      max-width: 380px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 40px rgba(0,0,0,0.3);
      animation: bounceIn 0.4s ease;
    }
    .event-emoji { font-size: 3.5rem; margin-bottom: 8px; }
    .event-title { font-size: 1.3rem; font-weight: 800; margin-bottom: 8px; }
    .event-desc { font-size: 0.9rem; color: var(--color-text-light); margin-bottom: 12px; }
    .event-status { padding: 8px 12px; border-radius: 8px; font-weight: 700; font-size: 0.85rem; margin-bottom: 10px; }
    .event-status.blocked { background: #e0f5e0; color: #408040; }
    .event-status.unblocked { background: #ffe0e0; color: #c04040; }
    .event-tip { font-size: 0.78rem; color: var(--color-text-light); margin-bottom: 14px; }

    /* ── Animations ────────────────────────────────────────────────────── */
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }
    @keyframes flipIn {
      from { transform: rotateY(90deg) scale(0.8); opacity: 0; }
      to   { transform: rotateY(0deg) scale(1); opacity: 1; }
    }
    @keyframes bounceIn {
      from { transform: scale(0.7); opacity: 0; }
      70%  { transform: scale(1.05); }
      to   { transform: scale(1); opacity: 1; }
    }
    @keyframes glowPulse {
      0%, 100% { box-shadow: 0 0 20px gold; }
      50%      { box-shadow: 0 0 40px gold, 0 0 60px #ffd700; }
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- HUD -->
    <div id="hud">
      <span id="hud-title">🐷 EPIG</span>
      <span id="hud-day">第 0 天</span>
      <span id="hud-coins">💰 500 金幣</span>
      <span id="hud-notif" style="display:none"></span>
    </div>

    <!-- Tab Bar -->
    <div id="tab-bar">
      <button class="tab-btn tab-active" id="tab-btn-pen">🏠 豬舍</button>
      <button class="tab-btn" id="tab-btn-shop">🛒 商店</button>
      <button class="tab-btn" id="tab-btn-gacha">🎰 抽卡</button>
    </div>

    <!-- Tab Panels -->
    <div id="tab-pen" class="tab-panel"></div>
    <div id="tab-shop" class="tab-panel hidden"></div>
    <div id="tab-gacha" class="tab-panel hidden"></div>
  </div>

  <script type="module" src="src/main.js"></script>
  <script>
    // Register service worker for PWA
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
